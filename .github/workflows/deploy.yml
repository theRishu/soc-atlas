name: Deploy SOC Atlas to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Zensical Framework
        run: pip install --upgrade zensical

      - name: Build and Deploy site
        run: zensical gh-deploy --force -f zensical.yml
